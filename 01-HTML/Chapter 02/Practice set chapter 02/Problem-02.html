<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probelem 02</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f4f4f4;
}

h1 {
    text-align: center;
    margin-top: 40px;
}

label {
    display: block;
    margin: 10px 0 5px;
    font-weight: bold;
    text-align: center;
}

/* Image styling */
img {
    display: block;
    margin: 0 auto 30px ;
    width: 300px;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* Hover effect */
img:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}</style>
</head>

<body>

    <!-- Create a page with 5 wallpaper images taken from the internet. -->
    <h1>Wallpaper Images From Local Computer</h1>
