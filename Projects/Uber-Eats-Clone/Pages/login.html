<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Uber Eats Pakistan</title>
    <link rel="stylesheet" href="/CSS/register.css">

    <!-- font family  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <form>
            <div class="register-login">
                <h1>Login</h1>
                <input type="text" class="collect-data" placeholder="Username or email">
                <input type="password" class="collect-data" placeholder="Password">
                <div class="privacy">
                    <label for="privacy-policy">Agree to term and service</label>
                    <input type="checkbox" id="privacy-policy">
                </div>
                <button type="submit">login</button>
                <p class="signup-login">Don't have an account?<a href="/Pages/signup.html"> Register</a></p>
            </div>
        </form>
    </main>
</body>

</html>
